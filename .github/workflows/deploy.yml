# .github/workflows/deploy.yml
# TEMPORARILY DISABLED - Re-enable after fixing dependencies
name: Enterprise AI Agent CI/CD Pipeline

on:
  workflow_dispatch:  # Manual trigger only
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]

# Minimal permissions — principle of least privilege for fork PR safety.
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & type-check
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.4.4 mypy==1.10.0

      - name: Ruff — lint
        run: ruff check app/ scripts/ tests/ --select E,F,W,I --ignore E501

      - name: Ruff — format check
        run: ruff format app/ scripts/ tests/ --check

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Test suite
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite
        env:
          # DATABASE_URL drives the SQLAlchemy engine — no sys.modules heuristic needed.
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          CHROMA_PERSIST_DIR: ./vectorstore
          # JWT_SECRET_KEY comes from a repository secret — never hardcoded here.
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY_TEST }}
        run: |
          pytest tests/ -v \
            --junitxml=test-results/results.xml \
            --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Docker build & push  (main branch only, not PRs)
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only run on pushes to main, not on pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write  # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass JWT_SECRET_KEY as a BuildKit secret so it is NEVER stored
          # in any image layer or visible in `docker history`.
          secrets: |
            jwt_secret=${{ secrets.JWT_SECRET_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy  (extend this stub for your target platform)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Use an environment with required reviewers for production gate control.
    environment: production
    permissions:
      contents: read

    steps:
      - name: Deploy image
        # Replace this step with your target platform's deploy action, e.g.:
        #   - AWS ECS: aws-actions/amazon-ecs-deploy-task-definition
        #   - GCP Cloud Run: google-github-actions/deploy-cloudrun
        #   - Kubernetes: helm/helm-action or kubectl rollout
        run: |
          echo "Deploy step: wire up your platform's deploy action here."
          echo "Image: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
